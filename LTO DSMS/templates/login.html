<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <!-- PRELOAD BACKGROUND IMAGE -->
    <link rel="preload" as="image" href="{{ url_for('static', filename='lto(2).png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Login Form (Right Side) -->
    <form method="POST"  class="login-form">
        <h2>Login</h2>
        
        Username or Email:
        <input type="text" name="username" value="{{ username_value|default('') }}"  
            style="border: 1px solid {% if field_errors.username %}red{% else %}#ccc{% endif %};"
            placeholder="Enter your username or email" required>

        {% if field_errors.username %}
            <p style="color:red; margin-top:5px;">{{ field_errors.username }}</p>
        {% endif %}

        Password:
            <div class="password-container">
                <input type="password" id="password" name="password"
                    style="border: 1px solid {% if field_errors.password %}red{% else %}#ccc{% endif %};"
                    placeholder="Enter your password" required>
                    
                <i id="togglePassword" class="bi bi-eye-slash toggle-password"></i>
            </div>

        {% if field_errors.password %}
            <p style="color:red; margin-top:5px;">{{ field_errors.password }}</p>
        {% endif %}

        <button type="submit">Login</button>

        {% if field_errors.general %}
            <p style="color:red; margin-top:15px; text-align:center;">
                {{ field_errors.general }}
            </p>
        {% endif %}

        <!-- Sign Up Redirect -->
        <p style="margin-top:15px; text-align:center;">
            Don't have an account yet?
            <a href="{{ url_for('signup') }}">Sign up</a>
        </p>
        
    </form>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    const toggle = document.getElementById("togglePassword");
    const password = document.getElementById("password");

    toggle.addEventListener("click", function () {
        if (password.type === "password") {
            password.type = "text";
            this.classList.remove("bi-eye-slash");
            this.classList.add("bi-eye");
        } else {
            password.type = "password";
            this.classList.remove("bi-eye");
            this.classList.add("bi-eye-slash");
        }
    });
    </script>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script>
    function togglePassword() {
        const pass = document.getElementById("password");

        if (pass.type === "password") {
            pass.type = "text";
        } else {
            pass.type = "password";
        }
    } 
    </script>

</body>
</html>
